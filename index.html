<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0c14;font-family:'Instrument Sans',sans-serif;}
*{box-sizing:border-box;}

.wallpaper{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 70% at 100% 0%, #e8735a 0%, #d45f8a 25%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 0% 100%, #a8c4d4 0%, #b8c8e8 30%, transparent 60%),
    radial-gradient(ellipse 90% 80% at 0% 30%, #c8cfe8 0%, #d4d8ee 40%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 50% 50%, #c4c8e0 0%, transparent 70%),
    #bcc4dc;
  animation: gradshift 12s ease-in-out infinite alternate;
}
@keyframes gradshift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(8deg) brightness(1.03); }
  100% { filter: hue-rotate(-5deg) brightness(0.98); }
}
.wallpaper::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size:160px 160px;pointer-events:none;
}

.menubar{position:fixed;top:0;left:0;right:0;height:28px;z-index:400;background:rgba(180,188,210,0.35);backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.mb-left{display:flex;align-items:center;gap:8px}
.mb-logo{font-size:12px;font-weight:600;color:rgba(30,30,50,.85);}
.mb-sep{width:1px;height:12px;background:rgba(30,30,50,.2);margin:0 4px;}
.mb-role{font-size:11px;font-weight:400;color:rgba(30,30,50,.5);}
.mb-item{font-size:11px;color:rgba(30,30,50,.35);margin-left:10px;}
.mb-right{display:flex;align-items:center;gap:12px}
.mb-time{font-size:11px;color:rgba(30,30,50,.4);letter-spacing:.04em}
.git-btn{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:4px 13px;border:0.5px solid rgba(30,30,80,.3);background:rgba(255,255,255,.25);color:rgba(20,20,60,.75);cursor:pointer;border-radius:3px;font-family:'Instrument Sans',sans-serif;transition:background .2s;backdrop-filter:blur(4px);}
.git-btn:hover{background:rgba(255,255,255,.4);}

.desktop{position:fixed;top:28px;left:0;right:0;bottom:0;z-index:1;overflow:hidden;}

.file-icon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:110px;z-index:10;transition:transform .22s cubic-bezier(.16,1,.3,1);}
.file-icon:hover{transform:scale(1.15);}
.file-icon:hover .file-name{background:rgba(10,60,180,.75);color:#fff;padding:2px 8px;border-radius:4px;}
.file-thumb{width:92px;height:92px;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 6px 24px rgba(0,0,0,.22),0 0 0 .5px rgba(255,255,255,.5);flex-shrink:0;background:#ddd;}
.file-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.file-thumb-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;border-radius:16px;}
.file-name{font-size:11px;font-weight:600;color:rgba(20,20,50,.85);text-align:center;line-height:1.3;text-shadow:0 1px 3px rgba(255,255,255,.6);max-width:108px;word-break:break-word;padding:2px 6px;border-radius:4px;transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.folder-thumb{width:92px;height:92px;position:relative;flex-shrink:0;}
.folder-body{position:absolute;bottom:0;left:4px;right:4px;height:72px;background:linear-gradient(165deg,#5ba3e8 0%,#2d72c4 100%);border-radius:9px;box-shadow:0 6px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.3);}
.folder-tab{position:absolute;top:11px;left:4px;width:32px;height:11px;background:#6ab0ee;border-radius:5px 5px 0 0;}
.folder-shine{position:absolute;top:8px;left:10px;right:10px;height:14px;background:rgba(255,255,255,.2);border-radius:4px;}

.pw{position:fixed;background:rgba(240,242,248,.88);border-radius:12px;border:.5px solid rgba(255,255,255,.7);box-shadow:0 20px 60px rgba(0,0,0,.18);backdrop-filter:blur(20px);z-index:300;display:none;width:300px;flex-direction:column;overflow:hidden;animation:winpop .2s cubic-bezier(.16,1,.3,1);}
@keyframes winpop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.pw-bar{height:32px;background:rgba(220,224,238,.7);border-bottom:.5px solid rgba(255,255,255,.4);display:flex;align-items:center;padding:0 12px;gap:7px;cursor:move;flex-shrink:0;}
.wb{width:11px;height:11px;border-radius:50%;flex-shrink:0;cursor:pointer;}
.wb.cl{background:#ff5f57}.wb.mn{background:#ffbd2e}.wb.mx{background:#28c940}
.pw-ttl{font-size:11px;font-weight:500;color:rgba(30,30,60,.45);margin-left:4px;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pw-img-wrap{height:200px;overflow:hidden;background:#c8cce0;position:relative;}
.pw-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.pw-grad{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(200,204,224,.6),transparent);pointer-events:none;}
.pw-bar2{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-top:.5px solid rgba(255,255,255,.4);}
.pw-tag{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(40,80,180,.7);}
.pw-open{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:5px 11px;background:rgba(40,80,200,.1);border:.5px solid rgba(40,80,200,.25);color:rgba(30,60,180,.8);border-radius:2px;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:background .2s;}
.pw-open:hover{background:rgba(40,80,200,.18);}

/* DOCK — glass effect like reference screenshot */
.dock-wrap{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:400;}
.dock{
  background:rgba(30,30,40,.55);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:.5px solid rgba(255,255,255,.18);
  border-bottom:.5px solid rgba(0,0,0,.2);
  border-radius:20px;
  padding:8px 14px;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12);
}
/* dock separator */
.dock-sep{width:.5px;height:32px;background:rgba(255,255,255,.18);margin:0 3px;align-self:center;}

.di{
  width:42px;height:42px;
  border-radius:10px;overflow:hidden;
  cursor:pointer;position:relative;flex-shrink:0;
  transition:transform .2s cubic-bezier(.16,1,.3,1);
  display:flex;align-items:center;justify-content:center;
}
.di:hover{transform:scale(1.5) translateY(-10px);}
.di:hover .dtip{opacity:1;transform:translateX(-50%) translateY(0);}
.di img{width:42px;height:42px;object-fit:cover;display:block;border-radius:10px;}
.di-padded img{width:28px;height:28px;object-fit:contain;border-radius:0;}
.dtip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);background:rgba(20,20,30,.9);border:.5px solid rgba(255,255,255,.15);font-size:9px;font-weight:600;letter-spacing:.07em;color:rgba(255,255,255,.85);padding:3px 8px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .15s,transform .15s;pointer-events:none;font-family:'Instrument Sans',sans-serif;}

/* MZIC modal overlay */
.mzic-modal{position:fixed;inset:0;z-index:700;display:none;background:#000;}
.mzic-modal iframe{width:100%;height:100%;border:none;}
.mzic-close{position:fixed;top:12px;right:16px;z-index:800;background:rgba(0,0,0,.6);border:.5px solid rgba(255,255,255,.2);color:#fff;font-family:'Instrument Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;padding:6px 14px;border-radius:4px;cursor:pointer;backdrop-filter:blur(8px);}
.mzic-close:hover{background:rgba(255,255,255,.15);}

.cmodal{position:fixed;inset:0;background:rgba(180,188,210,.4);z-index:600;display:none;align-items:center;justify-content:center;backdrop-filter:blur(16px);}
.cwin{background:rgba(235,238,248,.92);border-radius:14px;border:.5px solid rgba(255,255,255,.7);box-shadow:0 24px 64px rgba(0,0,0,.18);width:520px;overflow:hidden;backdrop-filter:blur(20px);}
.cwin-bar{height:40px;background:rgba(215,220,238,.8);border-bottom:.5px solid rgba(255,255,255,.4);display:flex;align-items:center;padding:0 14px;gap:8px;}
.cwin-title{font-size:12px;font-weight:500;color:rgba(30,30,60,.5);flex:1;text-align:center;letter-spacing:.02em;}
.form-section{border-bottom:.5px solid rgba(180,185,210,.35);}
.form-row{display:flex;}
.form-row .form-cell{flex:1;padding:16px 20px 14px;display:flex;flex-direction:column;gap:7px;}
.form-row .form-cell+.form-cell{border-left:.5px solid rgba(180,185,210,.35);}
.form-cell label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(30,30,80,.45);}
.form-cell input,.form-cell textarea{background:transparent;border:none;outline:none;font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:400;color:rgba(20,20,60,.85);letter-spacing:.01em;width:100%;}
.form-cell input::placeholder,.form-cell textarea::placeholder{color:rgba(60,70,120,.28);font-size:14px;}
.form-cell textarea{resize:none;height:110px;padding-top:2px;line-height:1.6;}
.form-footer{padding:14px 16px;}
.send-btn{font-family:'Instrument Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:14px;border:.5px solid rgba(40,80,200,.3);background:rgba(40,80,200,.08);color:rgba(30,60,180,.85);cursor:pointer;border-radius:7px;width:100%;transition:background .2s;}
.send-btn:hover{background:rgba(40,80,200,.15);}
.smsg{padding:52px;text-align:center;font-size:13px;color:rgba(30,60,180,.8);font-weight:500;display:none;}
</style>
</head>
<body>
<div class="wallpaper"></div>

<div class="menubar">
  <div class="mb-left">
    <span class="mb-logo">Ana Cecília Floriano</span>
    <span class="mb-sep"></span>
    <span class="mb-role">Product Designer</span>
    <span class="mb-item">Work</span>
    <span class="mb-item">2026</span>
  </div>
  <div class="mb-right">
    <span class="mb-time" id="clock"></span>
    <button class="git-btn" onclick="openC()">Get in touch</button>
  </div>
</div>

<div class="desktop" id="desktop"></div>

<div class="pw" id="pw">
  <div class="pw-bar" id="pw-bar">
    <div class="wb cl" onclick="closePW()"></div>
    <div class="wb mn" onclick="closePW()"></div>
    <div class="wb mx"></div>
    <span class="pw-ttl" id="pw-ttl"></span>
  </div>
  <div class="pw-img-wrap" id="pw-img-wrap">
    <img id="pw-img" src="" alt="">
    <div class="pw-grad"></div>
  </div>
  <div class="pw-bar2">
    <span class="pw-tag" id="pw-tag"></span>
    <button class="pw-open" id="pw-open">↗ Open</button>
  </div>
</div>

<div class="dock-wrap"><div class="dock" id="dock"></div></div>

<!-- AIQ full-screen modal -->
<div class="mzic-modal" id="aiq-modal">
  <button class="mzic-close" onclick="closeAIQ()">✕ Close</button>
  <iframe id="aiq-iframe" src="" allowfullscreen></iframe>
</div>

<!-- MZIC full-screen modal -->
<div class="mzic-modal" id="mzic-modal">
  <button class="mzic-close" onclick="closeMZIC()">✕ Close</button>
  <iframe id="mzic-iframe" src="" allowfullscreen></iframe>
</div>

<div class="cmodal" id="cmodal" onclick="maybeCloseC(event)">
  <div class="cwin">
    <div class="cwin-bar">
      <div class="wb cl" onclick="document.getElementById('cmodal').style.display='none'"></div>
      <div class="wb mn"></div><div class="wb mx"></div>
      <span class="cwin-title">New Message</span>
    </div>
    <div id="cform">
      <div class="form-section"><div class="form-row"><div class="form-cell"><label>Name</label><input id="cn" type="text" placeholder="Your name"></div><div class="form-cell"><label>Email</label><input id="ce" type="email" placeholder="your@email.com"></div></div></div>
      <div class="form-section"><div class="form-row"><div class="form-cell"><label>Subject</label><input id="cs" type="text" placeholder="What's this about?"></div></div></div>
      <div class="form-section"><div class="form-row"><div class="form-cell"><label>Message</label><textarea id="cm" placeholder="Tell me about your project..."></textarea></div></div></div>
      <div class="form-footer"><button class="send-btn" onclick="submitC()">SEND MESSAGE →</button></div>
    </div>
    <div class="smsg" id="csuc">Message sent. I'll be in touch soon.</div>
  </div>
</div>

const desktop=document.getElementById('desktop');
let activeIcon=null;

projects.forEach((p,i)=>{
  const pos=positions[i]||{x:10+i*10,y:10};
  const jx=Math.sin(i*7.3)*2.5, jy=Math.cos(i*5.1)*2;
  const el=document.createElement('div');
  el.className='file-icon';
  el.style.left=`calc(${pos.x+jx}%)`;
  el.style.top=`calc(${pos.y+jy}%)`;

  let thumb;
  if(p.folder){
    thumb=document.createElement('div');thumb.className='folder-thumb';
    thumb.innerHTML='<div class="folder-tab"></div><div class="folder-body"><div class="folder-shine"></div></div>';
  } else {
    thumb=document.createElement('div');thumb.className='file-thumb';thumb.style.background=p.bg;
    if(p.img){
      const img=document.createElement('img');img.src=p.img;img.alt=p.title;
      img.onerror=()=>{img.remove();addFb(thumb,p);};
      thumb.appendChild(img);
    } else { addFb(thumb,p); }
  }

  const nm=document.createElement('div');nm.className='file-name';nm.textContent=p.title;
  el.appendChild(thumb);el.appendChild(nm);

  el.addEventListener('click',e=>{
    e.stopPropagation();
    if(activeIcon) activeIcon.classList.remove('selected');
    el.classList.add('selected');activeIcon=el;
    if(p.folder){ window.open(p.url,'_blank'); }
    else if(p.url==='mzic'){ openMZIC(); }
    else if(p.url==='aiq'){ openAIQ(); }
    else { showPW(p,el); }
  });
  makeDrag(el);
  desktop.appendChild(el);
});

function addFb(t,p){const fb=document.createElement('div');fb.className='file-thumb-fb';fb.style.background=p.bg;fb.textContent=p.e||'📁';t.appendChild(fb);}
desktop.addEventListener('click',()=>{if(activeIcon){activeIcon.classList.remove('selected');activeIcon=null;}closePW();});

const pw=document.getElementById('pw');
function showPW(p,anchor){
  const ar=anchor.getBoundingClientRect();
  let x=ar.right+14,y=ar.top-10;
  const W=300,H=270,vw=window.innerWidth,vh=window.innerHeight;
  if(x+W>vw-8) x=ar.left-W-14;
  if(y+H>vh-80) y=vh-H-80;
  if(y<32) y=34;
  pw.style.left=x+'px';pw.style.top=y+'px';
  pw.style.display='flex';pw.style.flexDirection='column';
  document.getElementById('pw-ttl').textContent=p.title;
  document.getElementById('pw-tag').textContent=p.tag+' · '+p.year;
  const img=document.getElementById('pw-img'),wrap=document.getElementById('pw-img-wrap');
  const old=wrap.querySelector('.pw-fb');if(old)old.remove();
  if(p.img){img.style.display='block';img.src=p.img;}
  else{
    img.style.display='none';
    const fb=document.createElement('div');fb.className='pw-fb';
    fb.style.cssText=`width:100%;height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:${p.bg||'#c8cce0'};`;
    fb.innerHTML=`<span style="font-size:44px">${p.e||'📁'}</span><span style="font-size:10px;color:rgba(30,30,60,.4)">${p.tag}</span>`;
    wrap.insertBefore(fb,img);
  }
  document.getElementById('pw-open').onclick=()=>{if(p.url&&p.url!=='#'&&p.url!=='mzic')window.open(p.url,'_blank');};
}
function closePW(){pw.style.display='none';}
makeDrag(pw,document.getElementById('pw-bar'));

function makeDrag(el,handle){
  const h=handle||el;let sx,sy,ex,ey,drag=false;
  h.addEventListener('mousedown',e=>{
    if(e.target.closest('.wb,.pw-open,.git-btn,.send-btn,.mzic-close'))return;
    drag=true;sx=e.clientX;sy=e.clientY;
    const r=el.getBoundingClientRect();ex=r.left;ey=r.top;
    el.style.left=ex+'px';el.style.top=ey+'px';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{if(!drag)return;el.style.left=(ex+e.clientX-sx)+'px';el.style.top=(ey+e.clientY-sy)+'px';});
  document.addEventListener('mouseup',()=>{drag=false;});
}
